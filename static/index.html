<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- CRÍTICO PARA ANDROID Y CELULARES -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MVP Studio Web</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #121212; color: #ffffff; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .card { background: #1e1e1e; border-radius: 12px; padding: 25px; width: 100%; max-width: 500px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        h1, h2 { text-align: center; color: #bb86fc; margin-bottom: 20px; font-size: 1.5rem; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; color: #b0b0b0; font-size: 0.9rem; }
        input[type="text"], select, input[type="file"] { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #333; background: #2a2a2a; color: #fff; font-size: 16px; margin-bottom: 10px; }
        
        button { width: 100%; padding: 14px; border: none; border-radius: 6px; background: #bb86fc; color: #000; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; }
        button:hover { background: #9965f4; }
        
        .hidden { display: none; }
        .status-msg { margin-top: 15px; text-align: center; font-size: 0.9rem; color: #03dac6; word-break: break-word; }
        .error-msg { color: #cf6679; }
        .divider { text-align: center; margin: 15px 0; color: #666; font-size: 0.8rem; }
        
        /* REGLAS RESPONSIVAS ANDROID */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .card { padding: 15px; border-radius: 8px; }
            h1 { font-size: 1.3rem; }
            button { padding: 16px; font-size: 17px; } /* Más fácil de pulsar */
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- PANTALLA 1: VALIDACIÓN DE CÓDIGO -->
        <div id="sec-login">
            <h1>Activar MVP Studio</h1>
            <div class="form-group">
                <label for="licencia">Ingresa tu código de acceso:</label>
                <input type="text" id="licencia" placeholder="Ej: MVP-1234">
            </div>
            <button onclick="validarLicencia()">Ingresar</button>
            <div id="login-status" class="status-msg error-msg"></div>
        </div>

        <!-- PANTALLA 2: APLICACIÓN PRINCIPAL -->
        <div id="sec-main" class="hidden">
            <h2>MVP Studio IA</h2>
            
            <!-- Opción YouTube -->
            <div class="form-group">
                <label>1. Desde Enlace de YouTube:</label>
                <input type="text" id="yt-url" placeholder="https://www.youtube.com/watch?v=...">
                <button onclick="descargarYT()">Obtener Audio YT</button>
            </div>

            <div class="divider">--- O SUBE TU PROPIO ARCHIVO ---</div>

            <!-- Opción Archivo Local -->
            <div class="form-group">
                <label>Subir Audio desde tu Celular/PC:</label>
                <input type="file" id="local-file" accept="audio/*">
                <button onclick="subirArchivoLocal()" style="background: #03dac6;">Subir Archivo Local</button>
            </div>

            <hr style="border-color: #333; margin: 20px 0;">

            <!-- Separación IA -->
            <div class="form-group">
                <label for="mode">2. Modo de Separación IA:</label>
                <select id="mode">
                    <option value="2stems">Voz + Pista (2 Stems)</option>
                    <option value="4stems">Voz + Batería + Bajo + Otros (4 Stems)</option>
                </select>
            </div>

            <button id="btn-procesar" onclick="procesarIA()" disabled style="opacity: 0.5;">Iniciar Separación IA</button>

            <div id="main-status" class="status-msg"></div>
            <div id="results" style="margin-top:20px;"></div>
        </div>
    </div>

    <script>
        let currentFilePath = "";

        // Al cargar en Android/PC, verifica si ESTE navegador específico está activado
        window.onload = function() {
            if (localStorage.getItem("MVP_WEB_ACTIVE") === "true") {
                mostrarMain();
            }
        };

        async function validarLicencia() {
            const cod = document.getElementById("licencia").value.trim();
            const status = document.getElementById("login-status");
            if (!cod) return status.innerText = "Escribe un código válido.";
            
            status.innerText = "Verificando en Google Sheets...";
            status.className = "status-msg";

            try {
                const res = await fetch("/api/activar", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({codigo: cod})
                });
                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem("MVP_WEB_ACTIVE", "true");
                    mostrarMain();
                } else {
                    status.className = "status-msg error-msg";
                    status.innerText = data.detail || "Código incorrecto o usado.";
                }
            } catch(e) {
                status.className = "status-msg error-msg";
                status.innerText = "Error de conexión con el servidor.";
            }
        }

        function mostrarMain() {
            document.getElementById("sec-login").classList.add("hidden");
            document.getElementById("sec-main").classList.remove("hidden");
        }

        async function descargarYT() {
            const url = document.getElementById("yt-url").value.trim();
            const status = document.getElementById("main-status");
            if (!url) return alert("Pega un enlace de YouTube.");

            status.innerText = "Descargando desde YouTube...";
            try {
                const res = await fetch("/api/descargar", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({url: url})
                });
                const data = await res.json();

                if (res.ok) {
                    currentFilePath = data.file_path;
                    status.innerText = "✔ Audio descargado: " + data.title;
                    activarBtnProcesar();
                } else {
                    status.innerText = "❌ " + data.detail;
                }
            } catch(e) {
                status.innerText = "❌ Error de servidor al descargar.";
            }
        }

        async function subirArchivoLocal() {
            const fileInput = document.getElementById("local-file");
            const status = document.getElementById("main-status");
            if (!fileInput.files[0]) return alert("Selecciona un archivo de tu celular/PC.");

            const formData = new FormData();
            formData.append("file", fileInput.files[0]);

            status.innerText = "Subiendo archivo...";
            try {
                const res = await fetch("/api/upload", { method: "POST", body: formData });
                const data = await res.json();

                if (res.ok) {
                    currentFilePath = data.file_path;
                    status.innerText = "✔ Archivo cargado correctamente.";
                    activarBtnProcesar();
                } else {
                    status.innerText = "❌ Error al subir archivo.";
                }
            } catch(e) {
                status.innerText = "❌ Error de conexión al subir.";
            }
        }

        function activarBtnProcesar() {
            const btn = document.getElementById("btn-procesar");
            btn.disabled = false;
            btn.style.opacity = "1";
        }

        async function procesarIA() {
            const mode = document.getElementById("mode").value;
            const status = document.getElementById("main-status");
            status.innerText = "Enviando a procesar con IA en la nube...";

            try {
                const res = await fetch("/api/procesar", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({file_path: currentFilePath, mode: mode})
                });
                const data = await res.json();

                if (res.ok) {
                    monitorearTarea(data.task_id);
                } else {
                    status.innerText = "❌ Error al iniciar IA.";
                }
            } catch(e) {
                status.innerText = "❌ Error de conexión.";
            }
        }

        function monitorearTarea(taskId) {
            const status = document.getElementById("main-status");
            const interval = setInterval(async () => {
                const res = await fetch(`/api/task/${taskId}`);
                const data = await res.json();

                if (data.status === "completed") {
                    clearInterval(interval);
                    status.innerText = "🎉 ¡Separación Finalizada!";
                    mostrarResultados(data.files);
                } else if (data.status === "failed") {
                    clearInterval(interval);
                    status.innerText = "❌ Error en el proceso de IA.";
                } else {
                    status.innerText = "⏳ " + (data.message || "Procesando audio...");
                }
            }, 3000);
        }

        function mostrarResultados(files) {
            const div = document.getElementById("results");
            div.innerHTML = "<h3>Archivos Generados:</h3>";
            for (const [key, val] of Object.entries(files)) {
                div.innerHTML += `
                    <div style="margin-bottom:10px;">
                        <p style="text-transform:capitalize; font-size:12px;">${key}:</p>
                        <audio controls src="/${val}" style="width:100%;"></audio>
                    </div>`;
            }
        }
    </script>
</body>
</html>
