<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- El secreto para que no se vea miniatura en Android -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MVP Studio | AI Audio Separator</title>
    <style>
        /* --- ESTILOS BASE (TIPO SOFTWARE PC) --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0f111a; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
        
        /* Cabecera */
        .header { background-color: #1a1c29; padding: 15px 30px; border-bottom: 2px solid #8a2be2; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 1.5rem; color: #ffffff; letter-spacing: 1px; }
        .header span { color: #8a2be2; font-weight: bold; }

        /* Contenedor Principal de la App */
        .app-container { display: flex; flex: 1; overflow: hidden; }

        /* Panel Izquierdo (Controles) */
        .sidebar { width: 350px; background-color: #161824; padding: 25px; overflow-y: auto; border-right: 1px solid #2d3142; }
        .sidebar h2 { font-size: 1.1rem; color: #a2a5b5; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        
        .control-group { background: #1e2130; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #2d3142; }
        .control-group label { display: block; font-size: 0.9rem; margin-bottom: 8px; color: #c0c0c0; }
        input[type="text"], select, input[type="file"] { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #3d425c; background: #0f111a; color: #fff; margin-bottom: 10px; font-size: 0.95rem; }
        
        button { width: 100%; padding: 12px; border: none; border-radius: 5px; background: linear-gradient(90deg, #8a2be2, #4b0082); color: white; font-weight: bold; font-size: 1rem; cursor: pointer; transition: opacity 0.2s; margin-bottom: 10px; }
        button:hover { opacity: 0.8; }
        button:disabled { background: #3d425c; color: #888; cursor: not-allowed; }
        .btn-alt { background: #03dac6; color: #000; }

        /* Panel Derecho (Resultados) */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; background-color: #0f111a; }
        .status-box { background: #1e2130; border-left: 4px solid #8a2be2; padding: 15px; margin-bottom: 25px; border-radius: 4px; font-family: monospace; color: #03dac6; word-wrap: break-word; }
        
        /* Grid de Reproductores de Audio */
        .stems-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .stem-card { background: #1a1c29; padding: 20px; border-radius: 10px; border: 1px solid #2d3142; display: flex; flex-direction: column; align-items: center; }
        .stem-card h3 { color: #fff; margin-bottom: 15px; text-transform: capitalize; }
        audio { width: 100%; outline: none; }

        .hidden { display: none !important; }

        /* Pantalla de Login Superpuesta */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f111a; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: #1e2130; padding: 40px; border-radius: 10px; width: 90%; max-width: 400px; text-align: center; border: 1px solid #8a2be2; box-shadow: 0 0 30px rgba(138,43,226,0.2); }
        .login-box h1 { margin-bottom: 20px; color: #fff; }

        /* --- CSS RESPONSIVO PARA ANDROID / TABLETS --- */
        @media (max-width: 850px) {
            body { height: auto; min-height: 100vh; overflow-y: auto; }
            .app-container { flex-direction: column; overflow: visible; }
            
            /* El panel izquierdo se vuelve la parte superior */
            .sidebar { width: 100%; border-right: none; border-bottom: 2px solid #2d3142; padding: 15px; }
            
            /* Ajustes táctiles */
            button { padding: 15px; font-size: 1.1rem; }
            input[type="text"], select { font-size: 16px; padding: 12px; } /* Evita el zoom en iOS/Android */
            
            .main-content { padding: 15px; }
            .stems-grid { grid-template-columns: 1fr; } /* Reproductores en una sola columna vertical */
        }
    </style>
</head>
<body>

    <!-- Pantalla de Activación -->
    <div id="login-overlay">
        <div class="login-box">
            <h1>MVP <span>Studio</span></h1>
            <p style="color: #a2a5b5; margin-bottom: 20px;">Ingresa tu código de licencia</p>
            <input type="text" id="licencia" placeholder="Ej: MVSTUDIO-XXX">
            <button onclick="validarLicencia()">Activar Software</button>
            <p id="login-status" style="margin-top: 15px; color: #cf6679; font-size: 0.9rem;"></p>
        </div>
    </div>

    <!-- Interfaz Principal de la Aplicación -->
    <div class="header">
        <h1>MVP <span>Studio Web</span></h1>
        <div style="font-size: 0.9rem; color: #a2a5b5;">Estado: <span style="color: #03dac6;">Conectado a la Nube</span></div>
    </div>

    <div class="app-container">
        <!-- Sidebar Controles -->
        <div class="sidebar">
            <h2>1. Origen del Audio</h2>
            
            <div class="control-group">
                <label>Enlace de YouTube:</label>
                <input type="text" id="yt-url" placeholder="https://youtube.com/watch?v=...">
                <button onclick="descargarYT()">Extraer Audio</button>
            </div>

            <div style="text-align: center; color: #a2a5b5; margin-bottom: 20px; font-size: 0.8rem;">Opciones Locales</div>

            <div class="control-group">
                <label>Subir desde Dispositivo:</label>
                <input type="file" id="local-file" accept="audio/*">
                <button class="btn-alt" onclick="subirArchivoLocal()">Subir Archivo</button>
            </div>

            <h2>2. Procesamiento IA</h2>
            <div class="control-group">
                <label>Modelo de Separación:</label>
                <select id="mode">
                    <option value="2stems">2 Stems (Voz + Pista instrumental)</option>
                    <option value="4stems">4 Stems (Voz + Batería + Bajo + Otros)</option>
                </select>
                <button id="btn-procesar" onclick="procesarIA()" disabled>Separar Audio</button>
            </div>
        </div>

        <!-- Panel de Resultados y Logs -->
        <div class="main-content">
            <div id="status-panel" class="status-box">
                > Sistema iniciado y a la espera de archivos...
            </div>
            
            <div id="results" class="stems-grid">
                <!-- Los reproductores de audio aparecerán aquí -->
            </div>
        </div>
    </div>

    <script>
        let currentFilePath = "";

        // Control de sesión por dispositivo
        window.onload = function() {
            if (localStorage.getItem("MVP_WEB_ACTIVE") === "true") {
                document.getElementById("login-overlay").classList.add("hidden");
            }
        };

        function setStatus(msg, isError = false) {
            const panel = document.getElementById("status-panel");
            panel.style.color = isError ? "#cf6679" : "#03dac6";
            panel.style.borderLeftColor = isError ? "#cf6679" : "#8a2be2";
            panel.innerText = `> ${msg}`;
        }

        async function validarLicencia() {
            const cod = document.getElementById("licencia").value.trim();
            const statusText = document.getElementById("login-status");
            if (!cod) return statusText.innerText = "Por favor, escribe un código.";
            
            statusText.innerText = "Validando en servidor...";
            statusText.style.color = "#03dac6";

            try {
                const res = await fetch("/api/activar", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({codigo: cod})
                });
                
                if (res.ok) {
                    localStorage.setItem("MVP_WEB_ACTIVE", "true");
                    document.getElementById("login-overlay").classList.add("hidden");
                } else {
                    statusText.style.color = "#cf6679";
                    statusText.innerText = "Código incorrecto, bloqueado o inexistente.";
                }
            } catch(e) {
                statusText.style.color = "#cf6679";
                statusText.innerText = "Error de conexión con el servidor de licencias.";
            }
        }

        async function descargarYT() {
            const url = document.getElementById("yt-url").value.trim();
            if (!url) return setStatus("Advertencia: No hay enlace de YouTube.", true);

            setStatus("Iniciando bypass de servidor para descargar audio...");
            try {
                const res = await fetch("/api/descargar", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({url: url})
                });
                const data = await res.json();

                if (res.ok) {
                    currentFilePath = data.file_path;
                    setStatus("Éxito: Archivo descargado -> " + data.title);
                    document.getElementById("btn-procesar").disabled = false;
                } else {
                    setStatus(data.detail, true);
                }
            } catch(e) {
                setStatus("Error crítico al contactar al servidor para la descarga.", true);
            }
        }

        async function subirArchivoLocal() {
            const fileInput = document.getElementById("local-file");
            if (!fileInput.files[0]) return setStatus("Advertencia: Selecciona un archivo primero.", true);

            const formData = new FormData();
            formData.append("file", fileInput.files[0]);

            setStatus(`Subiendo archivo ${fileInput.files[0].name} al servidor...`);
            try {
                const res = await fetch("/api/upload", { method: "POST", body: formData });
                const data = await res.json();

                if (res.ok) {
                    currentFilePath = data.file_path;
                    setStatus("Éxito: Archivo cargado en el servidor correctamente.");
                    document.getElementById("btn-procesar").disabled = false;
                } else {
                    setStatus("Error al subir archivo.", true);
                }
            } catch(e) {
                setStatus("Error de conexión durante la subida.", true);
            }
        }

        async function procesarIA() {
            const mode = document.getElementById("mode").value;
            setStatus("Iniciando motor de Inteligencia Artificial (MVSEP)...");
            document.getElementById("btn-procesar").disabled = true;

            try {
                const res = await fetch("/api/procesar", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({file_path: currentFilePath, mode: mode})
                });
                const data = await res.json();

                if (res.ok) {
                    monitorearTarea(data.task_id);
                } else {
                    setStatus("Error al iniciar la IA en el servidor.", true);
                    document.getElementById("btn-procesar").disabled = false;
                }
            } catch(e) {
                setStatus("Error de conexión al procesar.", true);
                document.getElementById("btn-procesar").disabled = false;
            }
        }

        function monitorearTarea(taskId) {
            const interval = setInterval(async () => {
                const res = await fetch(`/api/task/${taskId}`);
                const data = await res.json();

                if (data.status === "completed") {
                    clearInterval(interval);
                    setStatus("¡Proceso de Separación Terminado Exitosamente!");
                    document.getElementById("btn-procesar").disabled = false;
                    mostrarResultados(data.files);
                } else if (data.status === "failed") {
                    clearInterval(interval);
                    setStatus("Error en la separación de audio.", true);
                    document.getElementById("btn-procesar").disabled = false;
                } else {
                    setStatus(data.message || "Procesando audio en la nube...");
                }
            }, 3000);
        }

        function mostrarResultados(files) {
            const div = document.getElementById("results");
            div.innerHTML = ""; // Limpiamos resultados anteriores
            
            for (const [key, val] of Object.entries(files)) {
                div.innerHTML += `
                    <div class="stem-card">
                        <h3>Pista: ${key}</h3>
                        <audio controls src="/${val}"></audio>
                    </div>`;
            }
        }
    </script>
</body>
</html>
